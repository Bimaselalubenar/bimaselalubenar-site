<div>
  <link href="./popup2.css" rel="stylesheet" />
  <div id="popup2" class="popup2-container">
    <div class="popup2-container1">
      <div class="popup2-header">
        <form class="popup2-form">
          <img
            alt="image"
            src="https://ik.imagekit.io/3ij6aly19/bankdata-bimaselalubenar/popup/Banner.png?updatedAt=1716073516598"
            class="popup2-image"
          />
          <div class="popup2-container2">
            <div class="popup2-container3">
              <input
                type="text"
                id="promoCode"
                required="true"
                placeholder="Masukan kode promo"
                class="popup2-textinput"
              />
              <button
                type="button"
                onclick="applyPromo()"
                class="popup2-button"
              >
                Klaim Promo
              </button>
            </div>
            <span id="message" class="popup2-text"> </span>
          </div>
        </form>
      </div>
      <button
        type="button"
        onclick="closeBanner('popup2')"
        aria-label="Close"
        class="popup2-close-button"
      >
        <svg viewBox="0 0 804.5714285714286 1024" class="popup2-icon">
          <path
            d="M741.714 755.429c0 14.286-5.714 28.571-16 38.857l-77.714 77.714c-10.286 10.286-24.571 16-38.857 16s-28.571-5.714-38.857-16l-168-168-168 168c-10.286 10.286-24.571 16-38.857 16s-28.571-5.714-38.857-16l-77.714-77.714c-10.286-10.286-16-24.571-16-38.857s5.714-28.571 16-38.857l168-168-168-168c-10.286-10.286-16-24.571-16-38.857s5.714-28.571 16-38.857l77.714-77.714c10.286-10.286 24.571-16 38.857-16s28.571 5.714 38.857 16l168 168 168-168c10.286-10.286 24.571-16 38.857-16s28.571 5.714 38.857 16l77.714 77.714c10.286 10.286 16 24.571 16 38.857s-5.714 28.571-16 38.857l-168 168 168 168c10.286 10.286 16 24.571 16 38.857z"
          ></path>
        </svg>
      </button>
    </div>
    <div>
      <div class="popup2-container5">
        <script>
          function showBanners() {
              document.getElementById('popup2').style.display = 'block';
          }

          function closeBanner(bannerId) {
              var banner = document.getElementById(bannerId);
              banner.style.display = 'none';
          }
        </script>
      </div>
    </div>
    <div>
      <div class="popup2-container7">
        <script>
          function applyPromo() {
              const validPromoCode = 'DISKON2024';
              const promoCodeInput = document.getElementById('promoCode').value;
              const messageElement = document.getElementById('message');

              if (promoCodeInput === validPromoCode) {
                  messageElement.textContent = 'Kode promo valid! Anda mendapatkan diskon menarik!';
                  messageElement.style.color = 'green';

                  // Mengarahkan ke WhatsApp
                  const phoneNumber = '6283845781063'; // Ganti dengan nomor WhatsApp yang dituju
                  const message = encodeURIComponent('Saya telah mengklaim kode promo *DISKON2024* mendapatkan diskon jasa pembuatan Website hingga Rp. 50.000,- untuk semua paket.');
                  const whatsappURL = `https://wa.me/${phoneNumber}?text=${message}`;

                  setTimeout(() => {
                      window.location.href = whatsappURL;
                  }, 2000); // Arahkan setelah 2 detik untuk memberi waktu pengguna membaca pesan
              } else {
                  messageElement.textContent = 'Kode promo tidak valid. Silakan coba lagi.';
                  messageElement.style.color = 'red';
              }
          }
        </script>
      </div>
    </div>
  </div>
</div>

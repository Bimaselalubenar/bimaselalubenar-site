              let index = 0;
              let letterIndex = 0;
              let isDeleting = false;
              let typingText = '';

              function type() {
                  const currentWord = words[index % words.length];
                  if (isDeleting) {
                      typingText = currentWord.substring(0, letterIndex - 1);
                      letterIndex--;
                  } else {
                      typingText = currentWord.substring(0, letterIndex + 1);
                      letterIndex++;
                  }

                  document.getElementById('pengumuman').textContent = typingText;

                  let typingSpeed = 100;
                  if (isDeleting) {
                      typingSpeed /= 2;
                  }

                  if (!isDeleting && typingText === currentWord) {
                      isDeleting = true;
                      typingSpeed = 800;
                  } else if (isDeleting && typingText === '') {
                      isDeleting = false;
                      index++;
                      typingSpeed = 200;
                  }

                  setTimeout(type, typingSpeed);
              }

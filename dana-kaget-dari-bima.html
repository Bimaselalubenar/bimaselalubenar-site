              ><script>
                // Atur waktu hitung mundur (format: 'TAHUN-BULAN-HARI-T-JAM:MENIT:DETIK')
                const countdownTimes = {
                    1: new Date('2024-05-28T07:10:00'), // Waktu untuk Link 1
                    2: new Date('2024-05-29T07:10:00'), // Waktu untuk Link 2
                    3: new Date('2024-05-30T07:10:00'), // Waktu untuk Link 3
                    4: new Date('2024-05-31T07:10:00')  // Waktu untuk Link 4
                };

                function startCountdown(divId, countdownId, endTime) {
                    function updateDiv() {
                        const div = document.getElementById(divId);
                        const countdownText = document.getElementById(countdownId);
                        const now = new Date();
                        const remainingTime = endTime - now;

                        if (remainingTime > 0) {
                            let days = Math.floor(remainingTime / (1000 * 60 * 60 * 24));
                            let hours = Math.floor((remainingTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                            let minutes = Math.floor((remainingTime % (1000 * 60 * 60)) / (1000 * 60));
                            let seconds = Math.floor((remainingTime % (1000 * 60)) / 1000);

                            countdownText.textContent = `${days} hari ${hours} jam ${minutes} menit ${seconds} detik`;
                            setTimeout(updateDiv, 1000);
                        } else {
                            countdownText.textContent = 'Link dapat diakses';
                            div.classList.remove('disabled');
                        }
                    }

                    updateDiv();
                }

                // Memulai hitungan mundur untuk setiap div dengan waktu yang telah ditentukan
                startCountdown('div1', 'countdown1', countdownTimes[1]);
                startCountdown('div2', 'countdown2', countdownTimes[2]);
                startCountdown('div3', 'countdown3', countdownTimes[3]);
                startCountdown('div4', 'countdown4', countdownTimes[4]);
              </script></div

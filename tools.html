                    function generateQRCode() {

                        qrcodeContainer.innerHTML = ''; // Clear previous QR code
                        var qrcode = new QRCode(qrcodeContainer, {

                        var qrcodeImg = document.querySelector('#qrcode img');
                        if (qrcodeImg) {

                  <script>
                    function downloadImage(event) {
                      event.preventDefault(); // Prevent form submission
                      var imageUrl = document.getElementById('imageUrl').value;
                      var format = document.getElementById('format').value;
                      var resolution = document.getElementById('resolution').value;

                      // Create a temporary image element
                      var img = new Image();
                      img.crossOrigin = 'Anonymous';

                      // When the image has loaded, create a canvas element to draw the image in the desired resolution
                      img.onload = function () {
                        var canvas = document.createElement('canvas');
                        if (resolution === 'hd') {
                          canvas.width = img.width * 2;
                          canvas.height = img.height * 2;
                        } else {
                          canvas.width = img.width;
                          canvas.height = img.height;
                        }
                        var ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                        // Convert the canvas content to a data URL representing the image
                        var dataURL = canvas.toDataURL('image/' + format);

                        // Create a temporary link element to trigger the download
                        var downloadLink = document.createElement('a');
                        downloadLink.href = dataURL;
                        downloadLink.download = 'image.' + format;
                        downloadLink.style.display = 'none';
                        document.body.appendChild(downloadLink);

                        // Trigger the download
                        downloadLink.click();

                        // Clean up
                        document.body.removeChild(downloadLink);
                      };

                      // Set the image source to trigger the download process
                      img.src = imageUrl;
                    }
                  </script>
